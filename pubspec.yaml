name: gamifyphotography
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^13.0.0
  dio: ^5.4.0
  shared_preferences: ^2.2.3
  image_picker: ^1.0.7
  camera: ^0.10.5
  cached_network_image: ^3.3.1
  lottie: ^3.1.0
  google_fonts: ^6.1.0
  percent_indicator: ^4.2.3
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  flutter_svg: ^2.0.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  freezed: ^2.4.7
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/visual_guides/
    - assets/images/badges/
