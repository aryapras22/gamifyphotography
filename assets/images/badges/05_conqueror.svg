<svg viewBox="0 0 400 400" width="400" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg5" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#140808"/>
      <stop offset="100%" stop-color="#060202"/>
    </radialGradient>
    <linearGradient id="crimsonGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe080"/>
      <stop offset="30%" stop-color="#e08020"/>
      <stop offset="60%" stop-color="#c03010"/>
      <stop offset="100%" stop-color="#700010"/>
    </linearGradient>
    <filter id="glow5">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <circle cx="200" cy="200" r="195" fill="url(#bg5)"/>
  <circle cx="200" cy="200" r="190" fill="none" stroke="#c03010" stroke-width="2" opacity="0.5"/>
  <circle cx="200" cy="200" r="183" fill="none" stroke="#e08020" stroke-width="0.8" opacity="0.3"/>

  <!-- Sun-like rays behind trophy -->
  <g stroke="#c03010" stroke-width="1.2" opacity="0.3">
    <line x1="200" y1="55" x2="200" y2="90"/>
    <line x1="200" y1="310" x2="200" y2="345"/>
    <line x1="55" y1="200" x2="90" y2="200"/>
    <line x1="310" y1="200" x2="345" y2="200"/>
    <line x1="93" y1="93" x2="116" y2="116"/>
    <line x1="284" y1="284" x2="307" y2="307"/>
    <line x1="307" y1="93" x2="284" y2="116"/>
    <line x1="116" y1="284" x2="93" y2="307"/>
    <line x1="68" y1="145" x2="95" y2="157"/>
    <line x1="305" y1="243" x2="332" y2="255"/>
    <line x1="145" y1="68" x2="157" y2="95"/>
    <line x1="243" y1="305" x2="255" y2="332"/>
    <line x1="332" y1="145" x2="305" y2="157"/>
    <line x1="95" y1="243" x2="68" y2="255"/>
    <line x1="255" y1="68" x2="243" y2="95"/>
    <line x1="157" y1="305" x2="145" y2="332"/>
  </g>

  <!-- Trophy -->
  <g filter="url(#glow5)">
    <!-- Trophy cup -->
    <path d="M155,100 L245,100 L240,185 Q240,225 200,235 Q160,225 160,185 Z" fill="url(#crimsonGold)" opacity="0.95"/>
    <!-- Trophy handles -->
    <path d="M155,120 Q115,120 115,160 Q115,185 155,185" fill="none" stroke="#e08020" stroke-width="8" stroke-linecap="round"/>
    <path d="M245,120 Q285,120 285,160 Q285,185 245,185" fill="none" stroke="#e08020" stroke-width="8" stroke-linecap="round"/>
    <!-- Trophy stem -->
    <rect x="188" y="233" width="24" height="40" fill="#c03010"/>
    <!-- Trophy base -->
    <rect x="155" y="272" width="90" height="18" rx="3" fill="url(#crimsonGold)"/>
    <rect x="145" y="288" width="110" height="12" rx="2" fill="#e08020"/>
    <!-- Star on cup -->
    <polygon points="200,128 207,148 228,148 212,160 218,180 200,168 182,180 188,160 172,148 193,148" fill="#ffe080" opacity="0.9"/>
  </g>

  <!-- Laurel wreaths -->
  <g stroke="#e08020" stroke-width="1.5" fill="none" opacity="0.6">
    <path d="M95,215 Q85,200 90,183 Q105,190 95,215Z"/>
    <path d="M85,240 Q72,225 78,205 Q95,213 85,240Z"/>
    <path d="M82,265 Q68,252 73,230 Q92,240 82,265Z"/>
    <path d="M305,215 Q315,200 310,183 Q295,190 305,215Z"/>
    <path d="M315,240 Q328,225 322,205 Q305,213 315,240Z"/>
    <path d="M318,265 Q332,252 327,230 Q308,240 318,265Z"/>
  </g>

  <text x="200" y="335" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="url(#crimsonGold)" letter-spacing="2">CONQUEROR</text>
  <text x="200" y="360" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#e08020" opacity="0.7" letter-spacing="2">ALL MISSIONS COMPLETE</text>
  <line x1="100" y1="372" x2="300" y2="372" stroke="#c03010" stroke-width="1" opacity="0.5"/>
</svg>
