<svg viewBox="0 0 400 400" width="400" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg8" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#180400"/>
      <stop offset="100%" stop-color="#060100"/>
    </radialGradient>
    <linearGradient id="flame" x1="0%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#ff2000"/>
      <stop offset="40%" stop-color="#ff8000"/>
      <stop offset="80%" stop-color="#ffcc00"/>
      <stop offset="100%" stop-color="#fff080"/>
    </linearGradient>
    <filter id="glow8">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <circle cx="200" cy="200" r="195" fill="url(#bg8)"/>
  <circle cx="200" cy="200" r="190" fill="none" stroke="#ff2000" stroke-width="2" opacity="0.5"/>
  <circle cx="200" cy="200" r="182" fill="none" stroke="#ff8000" stroke-width="0.7" opacity="0.25"/>

  <!-- 7 day streak marks (at bottom arc) -->
  <g stroke="#ff4000" stroke-width="3" stroke-linecap="round" opacity="0.8">
    <line x1="104" y1="318" x2="112" y2="330"/>
    <line x1="130" y1="340" x2="136" y2="353"/>
    <line x1="162" y1="354" x2="165" y2="368"/>
    <line x1="196" y1="360" x2="196" y2="374"/>
    <line x1="230" y1="354" x2="233" y2="368"/>
    <line x1="262" y1="340" x2="268" y2="353"/>
    <line x1="290" y1="318" x2="298" y2="330"/>
  </g>

  <!-- Day dots above streaks -->
  <g fill="#ff8000" opacity="0.7">
    <circle cx="108" cy="314" r="4"/>
    <circle cx="133" cy="336" r="4"/>
    <circle cx="163" cy="350" r="4"/>
    <circle cx="196" cy="356" r="4"/>
    <circle cx="229" cy="350" r="4"/>
    <circle cx="261" cy="336" r="4"/>
    <circle cx="287" cy="314" r="4"/>
  </g>

  <!-- Flame shape -->
  <g filter="url(#glow8)">
    <!-- Outer flame -->
    <path d="M200,75
      C220,95 250,100 245,140
      C260,120 268,145 260,165
      C275,150 280,175 270,195
      C285,180 288,210 275,230
      C280,215 275,245 255,255
      C260,240 248,265 230,268
      C248,250 240,280 215,282
      C228,265 220,290 200,290
      C180,290 172,265 185,282
      C160,280 152,250 170,268
      C152,265 140,240 145,255
      C125,245 120,215 125,230
      C112,210 115,180 130,195
      C120,175 125,150 140,165
      C132,145 140,120 155,140
      C150,100 180,95 200,75Z"
      fill="url(#flame)" opacity="0.9"/>
    <!-- Inner flame highlight -->
    <path d="M200,130
      C210,145 225,150 220,170
      C228,158 232,175 226,188
      C234,178 236,198 228,212
      C235,202 233,222 222,228
      C226,216 218,232 207,233
      C216,222 212,238 200,238
      C188,238 184,222 193,233
      C182,232 174,216 178,228
      C167,222 165,202 172,212
      C164,198 166,178 174,188
      C168,175 172,158 180,170
      C175,150 190,145 200,130Z"
      fill="#ffe080" opacity="0.6"/>
  </g>

  <!-- 7 text -->
  <text x="200" y="250" text-anchor="middle" font-family="Georgia, serif" font-size="48" font-weight="bold" fill="#fff080" opacity="0.85">7</text>

  <!-- DAYS label -->
  <text x="200" y="275" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#ff8000" opacity="0.8" letter-spacing="3">DAYS</text>

  <text x="200" y="355" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="bold" fill="#ff4000" letter-spacing="2">SURVIVOR</text>
  <text x="200" y="378" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#ff8000" opacity="0.65" letter-spacing="2">DAILY LOGIN STREAK</text>
</svg>
