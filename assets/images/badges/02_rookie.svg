<svg viewBox="0 0 400 400" width="400" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg2" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#0f1015"/>
      <stop offset="100%" stop-color="#050508"/>
    </radialGradient>
    <linearGradient id="silver" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8eef5"/>
      <stop offset="30%" stop-color="#a0b0c0"/>
      <stop offset="60%" stop-color="#c8d8e8"/>
      <stop offset="100%" stop-color="#607080"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <circle cx="200" cy="200" r="195" fill="url(#bg2)"/>
  <circle cx="200" cy="200" r="192" fill="none" stroke="#8099aa" stroke-width="1.5" opacity="0.4"/>

  <!-- Shield shape outer -->
  <path d="M200,36 L340,90 L340,230 Q340,320 200,370 Q60,320 60,230 L60,90 Z" fill="none" stroke="url(#silver)" stroke-width="3"/>
  <path d="M200,36 L340,90 L340,230 Q340,320 200,370 Q60,320 60,230 L60,90 Z" fill="#0f1015" opacity="0.4"/>

  <!-- Inner shield -->
  <path d="M200,58 L318,104 L318,228 Q318,302 200,346 Q82,302 82,228 L82,104 Z" fill="none" stroke="#8099aa" stroke-width="1" opacity="0.4"/>

  <!-- Star burst (15) -->
  <g filter="url(#glow2)">
    <polygon points="200,110 212,145 250,145 220,167 232,202 200,182 168,202 180,167 150,145 188,145" fill="url(#silver)" opacity="0.95"/>
  </g>

  <!-- Rising arrow under star -->
  <g stroke="#a0b8c8" stroke-width="2.5" fill="none" opacity="0.8">
    <line x1="200" y1="235" x2="200" y2="270"/>
    <line x1="200" y1="235" x2="185" y2="252"/>
    <line x1="200" y1="235" x2="215" y2="252"/>
  </g>

  <!-- Level 15 indicator -->
  <circle cx="200" cy="290" r="22" fill="none" stroke="#8099aa" stroke-width="1.5" opacity="0.6"/>
  <text x="200" y="296" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="url(#silver)">15</text>

  <!-- Sparkle dots -->
  <g fill="#c8d8e8" opacity="0.7">
    <circle cx="108" cy="130" r="2.5"/>
    <circle cx="292" cy="130" r="2.5"/>
    <circle cx="95" cy="200" r="2"/>
    <circle cx="305" cy="200" r="2"/>
    <circle cx="130" cy="80" r="1.5"/>
    <circle cx="270" cy="80" r="1.5"/>
  </g>

  <text x="200" y="368" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="bold" fill="url(#silver)" letter-spacing="3">ROOKIE</text>
  <line x1="130" y1="378" x2="270" y2="378" stroke="#8099aa" stroke-width="1" opacity="0.5"/>
</svg>
