<svg viewBox="0 0 400 400" width="400" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg7" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#120900"/>
      <stop offset="100%" stop-color="#060300"/>
    </radialGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe0a0"/>
      <stop offset="35%" stop-color="#ff8020"/>
      <stop offset="100%" stop-color="#a03000"/>
    </linearGradient>
    <filter id="glow7">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <circle cx="200" cy="200" r="195" fill="url(#bg7)"/>
  <circle cx="200" cy="200" r="190" fill="none" stroke="#ff8020" stroke-width="1.5" opacity="0.4"/>

  <!-- Gear shape (outer) -->
  <path d="
    M200,58 L213,70 L228,65 L235,80 L252,80 L254,96 L269,103 L265,119
    L278,130 L268,143 L275,158 L260,165 L260,182 L244,184 L238,199
    L244,214 L260,218 L260,234 L275,242 L268,257 L278,270 L265,281
    L269,297 L254,304 L252,320 L235,320 L228,335 L213,330 L200,342
    L187,330 L172,335 L165,320 L148,320 L146,304 L131,297 L135,281
    L122,270 L132,257 L125,242 L140,234 L140,218 L156,214 L162,199
    L156,184 L140,182 L140,165 L125,158 L132,143 L122,130 L135,119
    L131,103 L146,96 L148,80 L165,80 L172,65 L187,70 Z
  " fill="none" stroke="url(#orange)" stroke-width="2.5"/>

  <!-- Inner circle of gear -->
  <circle cx="200" cy="200" r="100" fill="none" stroke="#ff8020" stroke-width="1.5" opacity="0.5"/>

  <!-- Two interlocking gears (smaller) -->
  <g filter="url(#glow7)" opacity="0.85">
    <!-- Big gear lines suggesting rotation -->
    <circle cx="200" cy="200" r="68" fill="none" stroke="#ff8020" stroke-width="1" opacity="0.4"/>

    <!-- Puzzle-like quadrants -->
    <path d="M200,145 Q215,145 215,160 L215,190 Q230,190 230,200 Q230,210 215,210 L215,240 Q215,255 200,255 Q185,255 185,240 L185,210 Q170,210 170,200 Q170,190 185,190 L185,160 Q185,145 200,145Z" fill="#ff8020" opacity="0.8"/>

    <!-- Connector lines to show task+mission link -->
    <g stroke="#ffe0a0" stroke-width="1.5" opacity="0.6" fill="none">
      <line x1="148" y1="200" x2="170" y2="200"/>
      <line x1="230" y1="200" x2="252" y2="200"/>
      <line x1="200" y1="148" x2="200" y2="145"/>
      <line x1="200" y1="252" x2="200" y2="255"/>
    </g>

    <!-- Center dot -->
    <circle cx="200" cy="200" r="10" fill="#ffe0a0" opacity="0.9"/>
    <circle cx="200" cy="200" r="5" fill="#ff8020"/>
  </g>

  <!-- TASK + MISSION text arcs -->
  <path id="arc7t" d="M 88,200 A 112,112 0 0,1 312,200" fill="none"/>
  <path id="arc7b" d="M 88,200 A 112,112 0 0,0 312,200" fill="none"/>
  <text font-family="Georgia, serif" font-size="13" fill="#ff8020" letter-spacing="3" opacity="0.7">
    <textPath href="#arc7t" startOffset="8%">TASK  &amp;  MISSION</textPath>
  </text>

  <text x="200" y="355" text-anchor="middle" font-family="Georgia, serif" font-size="27" font-weight="bold" fill="url(#orange)" letter-spacing="2">ADAPTOR</text>
  <text x="200" y="378" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#ff8020" opacity="0.65" letter-spacing="2">COMPLETE</text>
</svg>
