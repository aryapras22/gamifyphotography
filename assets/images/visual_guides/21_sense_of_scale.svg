<svg viewBox="0 0 500 800" xmlns="http://www.w3.org/2000/svg">
  <rect width="500" height="800" fill="#000"/>
  <!-- Ground line -->
  <line x1="0" y1="660" x2="500" y2="660" stroke="#fff" stroke-width="1" opacity=".45"/>
  <!-- ROT ghost -->
  <line x1="167" y1="0"   x2="167" y2="800" stroke="#fff" stroke-width=".4" opacity=".12"/>
  <line x1="333" y1="0"   x2="333" y2="800" stroke="#fff" stroke-width=".4" opacity=".12"/>
  <line x1="0"   y1="267" x2="500" y2="267" stroke="#fff" stroke-width=".4" opacity=".12"/>
  <line x1="0"   y1="533" x2="500" y2="533" stroke="#fff" stroke-width=".4" opacity=".12"/>
  <!-- LARGE element (mountain / cliff shape) -->
  <path d="M60,660 L180,80 L300,660 Z" fill="none" stroke="#fff" stroke-width="1.3" opacity=".55"/>
  <!-- Large element surface lines (dimension) -->
  <g stroke="#fff" stroke-width=".5" opacity=".2">
    <line x1="120" y1="380" x2="240" y2="380"/>
    <line x1="100" y1="480" x2="265" y2="480"/>
    <line x1="80"  y1="560" x2="282" y2="560"/>
  </g>
  <!-- Scale dimension bracket (height of large element) -->
  <g stroke="#fff" stroke-width=".8" opacity=".35">
    <line x1="320" y1="80"  x2="340" y2="80"/>
    <line x1="330" y1="80"  x2="330" y2="660"/>
    <line x1="320" y1="660" x2="340" y2="660"/>
  </g>
  <!-- TINY human figure for scale (at base of mountain) -->
  <g stroke="#fff" stroke-width=".9" opacity=".5" fill="none">
    <circle cx="370" cy="646" r="7"/>
    <line x1="370" y1="653" x2="370" y2="670"/>
    <line x1="370" y1="658" x2="362" y2="666"/>
    <line x1="370" y1="658" x2="378" y2="666"/>
    <line x1="370" y1="670" x2="364" y2="680"/>
    <line x1="370" y1="670" x2="376" y2="680"/>
  </g>
  <!-- Scale comparison circles -->
  <!-- Large subject indicator -->
  <circle cx="180" cy="350" r="28" fill="none" stroke="#e03030" stroke-width="2"/>
  <line x1="162" y1="350" x2="198" y2="350" stroke="#e03030" stroke-width="1.2"/>
  <line x1="180" y1="332" x2="180" y2="368" stroke="#e03030" stroke-width="1.2"/>
  <!-- Tiny human scale indicator -->
  <circle cx="370" cy="655" r="14" fill="none" stroke="#e03030" stroke-width="1.7"/>
  <line x1="360" y1="655" x2="380" y2="655" stroke="#e03030" stroke-width="1"/>
  <line x1="370" y1="645" x2="370" y2="665" stroke="#e03030" stroke-width="1"/>
  <!-- Scale comparison line -->
  <line x1="210" y1="350" x2="354" y2="655" stroke="#e03030" stroke-width=".8" stroke-dasharray="5 7" opacity=".45"/>
</svg>
