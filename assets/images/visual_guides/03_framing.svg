<svg viewBox="0 0 500 800" width="500" height="800" xmlns="http://www.w3.org/2000/svg">
  <rect width="500" height="800" fill="#000"/>
  <!-- outer boundary hint -->
  <rect x="6" y="6" width="488" height="788" fill="none" stroke="#ffffff18" stroke-width="1"/>
  <!-- natural inner frame -->
  <rect x="70" y="100" width="360" height="600" rx="3" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.75"/>
  <!-- arch top on inner frame -->
  <path d="M70,100 Q70,68 104,60" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
  <path d="M430,100 Q430,68 396,60" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
  <path d="M70,700 Q70,732 104,740" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
  <path d="M430,700 Q430,732 396,740" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
  <!-- inner frame subtle fill -->
  <rect x="70" y="100" width="360" height="600" fill="#ffffff04"/>
  <!-- dashed center guides -->
  <line x1="70" y1="400" x2="240" y2="400" stroke="#e03030" stroke-width="0.7" stroke-dasharray="5 8" opacity="0.45"/>
  <line x1="260" y1="400" x2="430" y2="400" stroke="#e03030" stroke-width="0.7" stroke-dasharray="5 8" opacity="0.45"/>
  <!-- subject circle center of inner frame -->
  <circle cx="250" cy="400" r="26" fill="none" stroke="#e03030" stroke-width="2"/>
  <line x1="230" y1="400" x2="270" y2="400" stroke="#e03030" stroke-width="1.2"/>
  <line x1="250" y1="380" x2="250" y2="420" stroke="#e03030" stroke-width="1.2"/>
</svg>
