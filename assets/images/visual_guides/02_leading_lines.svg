<svg viewBox="0 0 500 800" width="500" height="800" xmlns="http://www.w3.org/2000/svg">

  <!-- main converging lines -->
  <line x1="10" y1="800" x2="250" y2="160" stroke="#ffffff" stroke-width="1.5" opacity="0.75"/>
  <line x1="490" y1="800" x2="250" y2="160" stroke="#ffffff" stroke-width="1.5" opacity="0.75"/>
  <!-- secondary lines -->
  <line x1="80" y1="800" x2="240" y2="160" stroke="#ffffff" stroke-width="0.7" opacity="0.35"/>
  <line x1="420" y1="800" x2="260" y2="160" stroke="#ffffff" stroke-width="0.7" opacity="0.35"/>
  <line x1="150" y1="800" x2="235" y2="160" stroke="#ffffff" stroke-width="0.5" opacity="0.2"/>
  <line x1="350" y1="800" x2="265" y2="160" stroke="#ffffff" stroke-width="0.5" opacity="0.2"/>
  <!-- depth cross lines -->
  <line x1="80" y1="630" x2="420" y2="630" stroke="#ffffff" stroke-width="0.5" opacity="0.2"/>
  <line x1="120" y1="490" x2="380" y2="490" stroke="#ffffff" stroke-width="0.5" opacity="0.2"/>
  <line x1="160" y1="360" x2="340" y2="360" stroke="#ffffff" stroke-width="0.5" opacity="0.2"/>
  <line x1="195" y1="260" x2="305" y2="260" stroke="#ffffff" stroke-width="0.5" opacity="0.2"/>
  <!-- subject circle at vanishing point -->
  <circle cx="250" cy="160" r="24" fill="none" stroke="#e03030" stroke-width="2"/>
  <line x1="232" y1="160" x2="268" y2="160" stroke="#e03030" stroke-width="1.2"/>
  <line x1="250" y1="142" x2="250" y2="178" stroke="#e03030" stroke-width="1.2"/>
</svg>
