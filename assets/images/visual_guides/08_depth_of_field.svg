<svg viewBox="0 0 500 800" width="500" height="800" xmlns="http://www.w3.org/2000/svg">

  <!-- background zone -->
  <rect x="0" y="0" width="500" height="260" fill="#ffffff04"/>
  <!-- midground zone (in focus) -->
  <rect x="0" y="260" width="500" height="260" fill="#ffffff07"/>
  <!-- foreground zone -->
  <rect x="0" y="520" width="500" height="280" fill="#ffffff04"/>
  <!-- zone dividers -->
  <line x1="0" y1="260" x2="500" y2="260" stroke="#ffffff" stroke-width="1" opacity="0.55"/>
  <line x1="0" y1="520" x2="500" y2="520" stroke="#ffffff" stroke-width="1" opacity="0.55"/>
  <!-- perspective lines -->
  <line x1="0" y1="800" x2="250" y2="0" stroke="#ffffff" stroke-width="0.4" opacity="0.15"/>
  <line x1="500" y1="800" x2="250" y2="0" stroke="#ffffff" stroke-width="0.4" opacity="0.15"/>
  <!-- background blur indicator (dashed) -->
  <circle cx="180" cy="130" r="40" fill="none" stroke="#ffffff" stroke-width="0.8" opacity="0.2" stroke-dasharray="4 6"/>
  <circle cx="320" cy="110" r="30" fill="none" stroke="#ffffff" stroke-width="0.8" opacity="0.2" stroke-dasharray="4 6"/>
  <!-- foreground blur indicator (dashed) -->
  <circle cx="130" cy="640" r="50" fill="none" stroke="#ffffff" stroke-width="0.8" opacity="0.2" stroke-dasharray="4 6"/>
  <circle cx="370" cy="660" r="40" fill="none" stroke="#ffffff" stroke-width="0.8" opacity="0.2" stroke-dasharray="4 6"/>
  <!-- zone labels -->
  <text x="20" y="36" fill="#ffffff35" font-size="15" font-family="sans-serif">background (blur)</text>
  <text x="20" y="295" fill="#ffffff55" font-size="15" font-family="sans-serif">midground (fokus)</text>
  <text x="20" y="556" fill="#ffffff35" font-size="15" font-family="sans-serif">foreground (blur)</text>
  <!-- sharp focus ring on subject (midground) -->
  <circle cx="250" cy="390" r="28" fill="none" stroke="#e03030" stroke-width="2"/>
  <line x1="228" y1="390" x2="272" y2="390" stroke="#e03030" stroke-width="1.2"/>
  <line x1="250" y1="368" x2="250" y2="412" stroke="#e03030" stroke-width="1.2"/>
  <!-- sharp focus bracket around subject -->
  <path d="M210,358 L200,358 L200,368" fill="none" stroke="#e03030" stroke-width="1" opacity="0.5"/>
  <path d="M290,358 L300,358 L300,368" fill="none" stroke="#e03030" stroke-width="1" opacity="0.5"/>
  <path d="M210,422 L200,422 L200,412" fill="none" stroke="#e03030" stroke-width="1" opacity="0.5"/>
  <path d="M290,422 L300,422 L300,412" fill="none" stroke="#e03030" stroke-width="1" opacity="0.5"/>
</svg>
