<svg viewBox="0 0 500 800" xmlns="http://www.w3.org/2000/svg">
  <rect width="500" height="800" fill="#000"/>
  <!-- Diagonal divider — top-left to bottom-right -->
  <line x1="0" y1="260" x2="500" y2="540" stroke="#fff" stroke-width="2" opacity=".75"/>
  <!-- Zone A: upper (rough diagonal hatching) -->
  <g stroke="#fff" stroke-width=".55" opacity=".16">
    <line x1="0"   y1="0"   x2="200" y2="0"/>  <line x1="0"   y1="55"  x2="310" y2="0"/>
    <line x1="0"   y1="110" x2="420" y2="0"/>  <line x1="0"   y1="165" x2="500" y2="0"/>
    <line x1="0"   y1="220" x2="500" y2="70"/>  <line x1="0"   y1="260" x2="500" y2="135"/>
    <line x1="50"  y1="260" x2="500" y2="195"/> <line x1="120" y1="260" x2="500" y2="255"/>
  </g>
  <!-- Zone B: lower (clean grid) -->
  <g stroke="#fff" stroke-width=".4" opacity=".12">
    <line x1="0"   y1="340" x2="500" y2="340"/> <line x1="0"   y1="420" x2="500" y2="420"/>
    <line x1="0"   y1="500" x2="500" y2="500"/> <line x1="0"   y1="580" x2="500" y2="580"/>
    <line x1="0"   y1="660" x2="500" y2="660"/> <line x1="0"   y1="740" x2="500" y2="740"/>
    <line x1="80"  y1="540" x2="80"  y2="800"/> <line x1="180" y1="540" x2="180" y2="800"/>
    <line x1="280" y1="540" x2="280" y2="800"/> <line x1="380" y1="540" x2="380" y2="800"/>
    <line x1="460" y1="540" x2="460" y2="800"/>
  </g>
  <!-- VS marker at midpoint of diagonal -->
  <circle cx="250" cy="400" r="24" fill="#111" stroke="#fff" stroke-width="1.2" opacity=".55"/>
  <text x="250" y="407" text-anchor="middle" fill="#ffffff75" font-size="15" font-family="sans-serif" font-weight="bold">VS</text>
  <!-- Subject A — upper zone -->
  <circle cx="110" cy="140" r="24" fill="none" stroke="#e03030" stroke-width="2.2"/>
  <line x1="92"  y1="140" x2="128" y2="140" stroke="#e03030" stroke-width="1.3"/>
  <line x1="110" y1="122" x2="110" y2="158" stroke="#e03030" stroke-width="1.3"/>
  <!-- Subject B — lower zone -->
  <circle cx="390" cy="660" r="24" fill="none" stroke="#e03030" stroke-width="2.2"/>
  <line x1="372" y1="660" x2="408" y2="660" stroke="#e03030" stroke-width="1.3"/>
  <line x1="390" y1="642" x2="390" y2="678" stroke="#e03030" stroke-width="1.3"/>
  <!-- Connection dash -->
  <line x1="128" y1="155" x2="365" y2="645" stroke="#e03030" stroke-width=".9" stroke-dasharray="5 8" opacity=".42"/>
</svg>
