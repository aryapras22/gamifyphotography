<svg viewBox="0 0 500 800" width="500" height="800" xmlns="http://www.w3.org/2000/svg">
  <rect width="500" height="800" fill="#000"/>
  <!-- outer border -->
  <rect x="6" y="6" width="488" height="788" fill="none" stroke="#ffffff18" stroke-width="0.8"/>
  <!-- radiating lines from center -->
  <line x1="250" y1="400" x2="0" y2="0" stroke="#ffffff" stroke-width="0.5" opacity="0.18"/>
  <line x1="250" y1="400" x2="500" y2="0" stroke="#ffffff" stroke-width="0.5" opacity="0.18"/>
  <line x1="250" y1="400" x2="0" y2="800" stroke="#ffffff" stroke-width="0.5" opacity="0.18"/>
  <line x1="250" y1="400" x2="500" y2="800" stroke="#ffffff" stroke-width="0.5" opacity="0.18"/>
  <!-- main cross axes -->
  <line x1="250" y1="0" x2="250" y2="800" stroke="#ffffff" stroke-width="1.2" opacity="0.6"/>
  <line x1="0" y1="400" x2="500" y2="400" stroke="#ffffff" stroke-width="1.2" opacity="0.6"/>
  <!-- diagonal axes -->
  <line x1="0" y1="0" x2="500" y2="800" stroke="#ffffff" stroke-width="0.6" opacity="0.28"/>
  <line x1="500" y1="0" x2="0" y2="800" stroke="#ffffff" stroke-width="0.6" opacity="0.28"/>
  <!-- concentric guide circles -->
  <circle cx="250" cy="400" r="80" fill="none" stroke="#ffffff" stroke-width="0.6" opacity="0.2"/>
  <circle cx="250" cy="400" r="160" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.14"/>
  <circle cx="250" cy="400" r="240" fill="none" stroke="#ffffff" stroke-width="0.4" opacity="0.1"/>
  <!-- center subject circle -->
  <circle cx="250" cy="400" r="28" fill="none" stroke="#e03030" stroke-width="2.2"/>
  <line x1="226" y1="400" x2="274" y2="400" stroke="#e03030" stroke-width="1.3"/>
  <line x1="250" y1="376" x2="250" y2="424" stroke="#e03030" stroke-width="1.3"/>
</svg>
