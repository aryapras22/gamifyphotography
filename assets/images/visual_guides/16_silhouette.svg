<svg viewBox="0 0 500 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="sunG" cx="50%" cy="100%" r="65%">
      <stop offset="0%"  stop-color="#fff" stop-opacity=".32"/>
      <stop offset="45%" stop-color="#fff" stop-opacity=".07"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="500" height="800" fill="#000"/>
  <!-- Sky bright glow -->
  <rect x="0" y="0" width="500" height="560" fill="#ffffff08"/>
  <ellipse cx="250" cy="560" rx="340" ry="260" fill="url(#sunG)"/>
  <!-- Horizon -->
  <line x1="0" y1="560" x2="500" y2="560" stroke="#fff" stroke-width="1.6" opacity=".72"/>
  <!-- Ground -->
  <rect x="0" y="560" width="500" height="240" fill="#ffffff05"/>
  <!-- Sun rays -->
  <g stroke="#fff" stroke-width=".55" opacity=".18">
    <line x1="250" y1="560" x2="0"   y2="0"/>
    <line x1="250" y1="560" x2="80"  y2="0"/>
    <line x1="250" y1="560" x2="165" y2="0"/>
    <line x1="250" y1="560" x2="335" y2="0"/>
    <line x1="250" y1="560" x2="420" y2="0"/>
    <line x1="250" y1="560" x2="500" y2="0"/>
    <line x1="250" y1="560" x2="500" y2="180"/>
    <line x1="250" y1="560" x2="0"   y2="180"/>
  </g>
  <!-- ROT ghost -->
  <line x1="167" y1="0"   x2="167" y2="800" stroke="#fff" stroke-width=".4" opacity=".14"/>
  <line x1="333" y1="0"   x2="333" y2="800" stroke="#fff" stroke-width=".4" opacity=".14"/>
  <line x1="0"   y1="533" x2="500" y2="533" stroke="#fff" stroke-width=".4" opacity=".14"/>
  <!-- Person silhouette (white outline) at ROT power point -->
  <g stroke="#fff" stroke-width=".9" opacity=".38" fill="none">
    <circle cx="167" cy="500" r="20"/>
    <line x1="167" y1="520" x2="167" y2="568"/>
    <line x1="167" y1="534" x2="148" y2="556"/>
    <line x1="167" y1="534" x2="186" y2="556"/>
    <line x1="167" y1="568" x2="152" y2="605"/>
    <line x1="167" y1="568" x2="182" y2="605"/>
  </g>
  <!-- Sun indicator -->
  <circle cx="250" cy="560" r="12" fill="none" stroke="#fff" stroke-width="1.4" opacity=".6"/>
  <!-- Subject circle -->
  <circle cx="167" cy="533" r="26" fill="none" stroke="#e03030" stroke-width="2.2"/>
  <line x1="149" y1="533" x2="185" y2="533" stroke="#e03030" stroke-width="1.3"/>
  <line x1="167" y1="515" x2="167" y2="551" stroke="#e03030" stroke-width="1.3"/>
</svg>
