<svg viewBox="0 0 500 800" xmlns="http://www.w3.org/2000/svg">
  <rect width="500" height="800" fill="#000"/>
  <!-- ROT grid -->
  <line x1="167" y1="0"   x2="167" y2="800" stroke="#fff" stroke-width="1.1" opacity=".6"/>
  <line x1="333" y1="0"   x2="333" y2="800" stroke="#fff" stroke-width="1.1" opacity=".6"/>
  <line x1="0"   y1="267" x2="500" y2="267" stroke="#fff" stroke-width="1.1" opacity=".6"/>
  <line x1="0"   y1="533" x2="500" y2="533" stroke="#fff" stroke-width="1.1" opacity=".6"/>
  <!-- Lead room zone (right 2/3) — bright fill -->
  <rect x="167" y="0" width="333" height="800" fill="#ffffff06"/>
  <!-- Motion/gaze direction arrows -->
  <g stroke="#fff" stroke-width="1.3" opacity=".5" fill="none">
    <line x1="200" y1="267" x2="460" y2="267"/>
    <polygon points="460,261 476,267 460,273" fill="#fff" opacity=".5"/>
  </g>
  <g stroke="#fff" stroke-width=".6" opacity=".25" fill="none">
    <line x1="200" y1="310" x2="430" y2="310" stroke-dasharray="5 7"/>
    <line x1="200" y1="224" x2="430" y2="224" stroke-dasharray="5 7"/>
    <line x1="200" y1="355" x2="400" y2="355" stroke-dasharray="4 8"/>
    <line x1="200" y1="180" x2="400" y2="180" stroke-dasharray="4 8"/>
  </g>
  <!-- Narrow dead zone (left of subject) -->
  <rect x="0" y="0" width="167" height="800" fill="#e0303009"/>
  <!-- Subject at LEFT power point facing right -->
  <circle cx="167" cy="267" r="24" fill="none" stroke="#e03030" stroke-width="2.2"/>
  <line x1="149" y1="267" x2="185" y2="267" stroke="#e03030" stroke-width="1.3"/>
  <line x1="167" y1="249" x2="167" y2="285" stroke="#e03030" stroke-width="1.3"/>
  <!-- Gaze arc indicator -->
  <path d="M185,254 Q215,267 185,280" fill="none" stroke="#e03030" stroke-width="1.2" opacity=".6"/>
  <polygon points="183,280 197,274 190,287" fill="#e03030" opacity=".6"/>
  <!-- Lead room label -->
  <text x="355" y="430" text-anchor="middle" fill="#ffffff22" font-size="14" font-family="sans-serif">lead room</text>
  <!-- Dead zone label -->
  <text x="83"  y="740" text-anchor="middle" fill="#e0303040" font-size="11" font-family="sans-serif">dead zone</text>
</svg>
