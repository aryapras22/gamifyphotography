<svg viewBox="0 0 500 800" xmlns="http://www.w3.org/2000/svg">
  <rect width="500" height="800" fill="#000"/>
  <!-- ROT ghost grid -->
  <line x1="167" y1="0"   x2="167" y2="800" stroke="#fff" stroke-width=".4" opacity=".12"/>
  <line x1="333" y1="0"   x2="333" y2="800" stroke="#fff" stroke-width=".4" opacity=".12"/>
  <line x1="0"   y1="267" x2="500" y2="267" stroke="#fff" stroke-width=".4" opacity=".12"/>
  <line x1="0"   y1="533" x2="500" y2="533" stroke="#fff" stroke-width=".4" opacity=".12"/>
  <!-- Main S-curve -->
  <path d="M250,780 C330,780 330,640 250,560 C170,480 170,320 250,210 C300,145 360,80 370,20"
        fill="none" stroke="#fff" stroke-width="1.8" opacity=".72"/>
  <!-- Parallel S (left) -->
  <path d="M230,780 C310,780 310,640 230,560 C150,480 150,320 230,210 C280,145 340,80 350,20"
        fill="none" stroke="#fff" stroke-width=".6" opacity=".28"/>
  <!-- Parallel S (right) -->
  <path d="M270,780 C350,780 350,640 270,560 C190,480 190,320 270,210 C320,145 380,80 390,20"
        fill="none" stroke="#fff" stroke-width=".6" opacity=".28"/>
  <!-- Inflection point 1 (lower) -->
  <circle cx="250" cy="560" r="24" fill="none" stroke="#e03030" stroke-width="2.2"/>
  <line x1="232" y1="560" x2="268" y2="560" stroke="#e03030" stroke-width="1.3"/>
  <line x1="250" y1="542" x2="250" y2="578" stroke="#e03030" stroke-width="1.3"/>
  <!-- Inflection point 2 (upper) -->
  <circle cx="250" cy="210" r="20" fill="none" stroke="#e03030" stroke-width="1.8" opacity=".65"/>
  <line x1="234" y1="210" x2="266" y2="210" stroke="#e03030" stroke-width="1.1" opacity=".65"/>
  <line x1="250" y1="194" x2="250" y2="226" stroke="#e03030" stroke-width="1.1" opacity=".65"/>
  <!-- Entry / exit dots -->
  <circle cx="250" cy="780" r="6" fill="none" stroke="#fff" stroke-width="1" opacity=".4"/>
  <circle cx="370" cy="20"  r="6" fill="none" stroke="#fff" stroke-width="1" opacity=".4"/>
</svg>
