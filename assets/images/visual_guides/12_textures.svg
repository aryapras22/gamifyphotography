<svg viewBox="0 0 500 800" xmlns="http://www.w3.org/2000/svg">
  <rect width="500" height="800" fill="#000"/>
  <!-- Dense diagonal hatching = texture suggestion -->
  <g stroke="#fff" stroke-width=".65" opacity=".2">
    <line x1="0"   y1="50"  x2="50"  y2="0"/>  <line x1="0"   y1="110" x2="110" y2="0"/>
    <line x1="0"   y1="170" x2="170" y2="0"/>  <line x1="0"   y1="230" x2="230" y2="0"/>
    <line x1="0"   y1="290" x2="290" y2="0"/>  <line x1="0"   y1="350" x2="350" y2="0"/>
    <line x1="0"   y1="410" x2="410" y2="0"/>  <line x1="0"   y1="470" x2="470" y2="0"/>
    <line x1="0"   y1="530" x2="500" y2="30"/>  <line x1="0"   y1="590" x2="500" y2="90"/>
    <line x1="0"   y1="650" x2="500" y2="150"/> <line x1="0"   y1="710" x2="500" y2="210"/>
    <line x1="0"   y1="770" x2="500" y2="270"/> <line x1="0"   y1="800" x2="500" y2="300"/>
    <line x1="50"  y1="800" x2="500" y2="350"/> <line x1="110" y1="800" x2="500" y2="410"/>
    <line x1="170" y1="800" x2="500" y2="470"/> <line x1="230" y1="800" x2="500" y2="530"/>
    <line x1="290" y1="800" x2="500" y2="590"/> <line x1="350" y1="800" x2="500" y2="650"/>
    <line x1="410" y1="800" x2="500" y2="710"/> <line x1="470" y1="800" x2="500" y2="770"/>
  </g>
  <!-- Sidelight direction arrow -->
  <line x1="0" y1="400" x2="490" y2="400" stroke="#fff" stroke-width=".9" opacity=".35" stroke-dasharray="6 7"/>
  <polygon points="490,395 505,400 490,405" fill="#fff" opacity=".35"/>
  <!-- ROT ghost grid -->
  <line x1="167" y1="0"   x2="167" y2="800" stroke="#fff" stroke-width=".4" opacity=".12"/>
  <line x1="333" y1="0"   x2="333" y2="800" stroke="#fff" stroke-width=".4" opacity=".12"/>
  <line x1="0"   y1="267" x2="500" y2="267" stroke="#fff" stroke-width=".4" opacity=".12"/>
  <line x1="0"   y1="533" x2="500" y2="533" stroke="#fff" stroke-width=".4" opacity=".12"/>
  <!-- Close-up zone bracket -->
  <rect x="240" y="217" width="180" height="180" fill="none" stroke="#fff" stroke-width=".9" opacity=".35" stroke-dasharray="5 6"/>
  <!-- Subject -->
  <circle cx="333" cy="267" r="24" fill="none" stroke="#e03030" stroke-width="2.2"/>
  <line x1="315" y1="267" x2="351" y2="267" stroke="#e03030" stroke-width="1.3"/>
  <line x1="333" y1="249" x2="333" y2="285" stroke="#e03030" stroke-width="1.3"/>
  <circle cx="333" cy="267" r="38" fill="none" stroke="#e03030" stroke-width=".8" opacity=".35" stroke-dasharray="3 5"/>
</svg>
