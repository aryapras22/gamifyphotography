<svg viewBox="0 0 500 800" width="500" height="800" xmlns="http://www.w3.org/2000/svg">

  <!-- faint rule of thirds grid -->
  <line x1="167" y1="0" x2="167" y2="800" stroke="#ffffff" stroke-width="0.6" opacity="0.18"/>
  <line x1="333" y1="0" x2="333" y2="800" stroke="#ffffff" stroke-width="0.6" opacity="0.18"/>
  <line x1="0" y1="267" x2="500" y2="267" stroke="#ffffff" stroke-width="0.6" opacity="0.18"/>
  <line x1="0" y1="533" x2="500" y2="533" stroke="#ffffff" stroke-width="0.6" opacity="0.18"/>
  <!-- horizontal base line for subjects -->
  <line x1="60" y1="480" x2="440" y2="480" stroke="#ffffff" stroke-width="0.7" opacity="0.3"/>
  <!-- triangle guide connecting 3 subjects -->
  <polygon points="250,260 110,480 390,480" fill="none" stroke="#ffffff" stroke-width="0.7" opacity="0.28"/>
  <!-- 3 subject circles (odd number) -->
  <!-- center top -->
  <circle cx="250" cy="260" r="24" fill="none" stroke="#e03030" stroke-width="2"/>
  <line x1="232" y1="260" x2="268" y2="260" stroke="#e03030" stroke-width="1.2"/>
  <line x1="250" y1="242" x2="250" y2="278" stroke="#e03030" stroke-width="1.2"/>
  <!-- left bottom -->
  <circle cx="110" cy="480" r="24" fill="none" stroke="#e03030" stroke-width="2"/>
  <line x1="92" y1="480" x2="128" y2="480" stroke="#e03030" stroke-width="1.2"/>
  <line x1="110" y1="462" x2="110" y2="498" stroke="#e03030" stroke-width="1.2"/>
  <!-- right bottom -->
  <circle cx="390" cy="480" r="24" fill="none" stroke="#e03030" stroke-width="2"/>
  <line x1="372" y1="480" x2="408" y2="480" stroke="#e03030" stroke-width="1.2"/>
  <line x1="390" y1="462" x2="390" y2="498" stroke="#e03030" stroke-width="1.2"/>
  <!-- number labels -->
  <text x="250" y="256" text-anchor="middle" dominant-baseline="middle" fill="#e03030" font-size="14" font-family="sans-serif" opacity="0.7">1</text>
  <text x="110" y="476" text-anchor="middle" dominant-baseline="middle" fill="#e03030" font-size="14" font-family="sans-serif" opacity="0.7">2</text>
  <text x="390" y="476" text-anchor="middle" dominant-baseline="middle" fill="#e03030" font-size="14" font-family="sans-serif" opacity="0.7">3</text>
</svg>
